<sly  data-sly-use.cardList="com.voghan.pillar.core.models.cmp.CardListCmp"
      data-sly-use.cardTpl="card.html"/>

<div class="cmp-card-list__">
    <div id="card-list-" class="cmp-card-list" >
        <div class="cmp-card-list__content">
            <h2 class="cmp-card-list__title"> ${cardList.headline} </h2>
            <div class="cmp-card-list__description">
                ${cardList.shortDescription @ context='html'}
            </div>
            <ul data-sly-list.cardItem="${cardList.cards}" class="cmp-card-list__list">
                <li data-sly-test="${cardList.isCardsFound}"
                    class="cmp-card-list__item" data-sly-call="${cardTpl.card @ card = cardItem}"></li>
            </ul>
        </div>
    </div>
</div>

<sly data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-sly-call="${template.placeholder @ isEmpty=!properties.fragmentPath}"></sly>
