# CI: Maven build + optional static analysis + frontend lint/test/build
# Drops reports/artifacts if present.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Build (Maven + Frontend)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [11]
        node: [18]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Cache frontend node_modules (ui.frontend)
        uses: actions/cache@v4
        with:
          path: ui.frontend/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-${{ hashFiles('ui.frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-${{ matrix.node }}-

      - name: Build backend (Maven)
        run: mvn -B -V -T1C clean verify
        # This will run unit tests and any configured verify-phase plugins (e.g. integration tests in it.tests)

      - name: Static analysis (SpotBugs / PMD / Checkstyle) - conditional
        run: |
          # Run checks only if the corresponding plugin is present in one of the pom.xml files
          if grep -R --include="pom.xml" -q "<artifactId>spotbugs-maven-plugin</artifactId>" .; then
            echo "Running SpotBugs checks..."
            mvn -B spotbugs:check || true
          else
            echo "SpotBugs plugin not found; skipping"
          fi

          if grep -R --include="pom.xml" -q "<artifactId>pmd-maven-plugin</artifactId>" .; then
            echo "Running PMD checks..."
            mvn -B pmd:check || true
          else
            echo "PMD plugin not found; skipping"
          fi

          if grep -R --include="pom.xml" -q "<artifactId>maven-checkstyle-plugin</artifactId>" .; then
            echo "Running Checkstyle checks..."
            mvn -B checkstyle:check || true
          else
            echo "Checkstyle plugin not found; skipping"
          fi

          # Optional: run OWASP dependency-check if configured (Maven plugin or standalone)
          if grep -R --include="pom.xml" -q "org.owasp:dependency-check-maven" .; then
            echo "Running OWASP Dependency-Check..."
            mvn -B org.owasp:dependency-check-maven:check || true
          else
            echo "OWASP Dependency-Check plugin not found; skipping"
          fi

      - name: Frontend: install and run checks (ui.frontend)
        run: |
          if [ -f ui.frontend/package.json ]; then
            cd ui.frontend
            npm ci
            # Lint, test and build commands are optional in package.json; --if-present allows skipping
            npm run --if-present lint
            npm run --if-present test
            npm run --if-present build
          else
            echo "No ui.frontend/package.json found, skipping frontend steps"
          fi

      - name: Collect Maven surefire/failsafe and site reports (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-reports
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports
            **/target/site
            **/target/spotbugsXml.xml
            **/target/pmd.xml
            **/target/checkstyle-result.xml

      - name: Collect frontend artifacts (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          path: |
            ui.frontend/build
            ui.frontend/coverage
            ui.frontend/test-results